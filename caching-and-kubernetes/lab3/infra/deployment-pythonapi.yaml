apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api-deployment
  namespace: w255
  labels:
    app: housing-label
spec:
  replicas: 3
  selector:
    matchLabels:
      app: housing-label
  template:
    metadata:
      labels:
        app: housing-label
    spec:
      containers:
      - name: housing-demo
        image: lab3:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: REDIS_URL
            value: redis://redis-service
          - name: REDIS_PORT
            value: "6379"  
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            scheme: HTTP
            path: /lab/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            scheme: HTTP
            path: /lab/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 3
        livenessProbe:
          httpGet:
            scheme: HTTP
            path: /lab/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          limits:
            memory: 400Mi
          requests:
            cpu: 100m
            memory: 200Mi
      initContainers:
      - name: init-verify-redis-service-dns
        image: busybox
        command:
          [
           "sh",
           "-c",
           "until nc -vz redis-service 6379; do echo 'waiting for redis-service from DNS'; sleep 2; done",
          ]
      - name: init-verify-redis-ready
        image: busybox
        command:
          [
            "sh",
            "-c",
            "until (printf 'PING\r\n';) | nc redis-service 6379; do echo 'waiting for redis to PONG'; sleep 1; done",
          ]

